<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="nav">
            <div id="heading">
                <p>Counter</p>
            </div>
            <button id="toggle">Light Mode</button>
        </div>
    </header>
    <main class="main">
        <div class="counter-card">
            <div id="total-count">0</div>
            <!-- <div id="message">Limit Reached</div> -->
            <div class="container">
                <div class="button-container">
                    <div id="buttonadd">+</div>
                    <div id="buttonsub">-</div>
                </div>
                <button id="reset">Reset</button>
            </div>
        </div>
    </main>
    <footer>
        <div class="footer">
            <p>Made &hearts; codebyshreya</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>

</html>
